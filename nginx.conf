# TalkY: статика с диска (как у чистого лендинга), динамика — прокси в Flask (127.0.0.1:4242).
#
# 1) Соберите клиент (vite) и скопируйте каталог client/dist на сервер, например:
#    /home/talky/client/dist
#    Должны лежать index.html, assets/, thanks88/, favicon/ и т.д.
# 2) В этом файле замените root ниже, если путь другой.
# 3) docker compose: проброс 4242:4242, curl http://127.0.0.1:4242/create-checkout-session отвечает (405 без POST — норма).

upstream talky_backend {
    server 127.0.0.1:4242;
    keepalive 32;
}

# ----------------------------------------------------------------------
# РЕДИРЕКТ: HTTP (80) -> HTTPS (443)
# ----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name talky-app.tech www.talky-app.tech;

    return 301 https://$host$request_uri;
}

# ----------------------------------------------------------------------
# ОСНОВНОЙ ХОСТ: HTTPS — статика из dist, API/сессии — во Flask
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name talky-app.tech www.talky-app.tech;

    root /home/talky/client/dist;
    index index.html;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate /etc/letsencrypt/live/talky-app.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/talky-app.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/talky-app.tech/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Заголовки безопасности ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/talky-app.tech.access.log;
    error_log /var/log/nginx/talky-app.tech.error.log;

    # Кэш для ассетов Vite (имена с хэшем)
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Только Flask (Stripe, сессия, редиректы после оплаты) ---
    location = /webhook {
        proxy_pass http://talky_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location = /create-checkout-session {
        proxy_pass http://talky_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location = /thanks {
        proxy_pass http://talky_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location = /download {
        proxy_pass http://talky_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }

    location = /cancel {
        proxy_pass http://talky_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Главная — index.html из dist
    location = / {
        try_files /index.html =404;
    }

    # Остальное — файлы из dist (MPA: /thanks88/, /payment-failed/, favicon, og-image и т.д.)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
